<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFG → CNF / GNF Converter</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0c0;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --text-faint: #3a3a55;
    --step-colors: #7c5cfc, #fc5c7d, #fcb55c, #5cf0c0, #5cb4fc, #fc5cec;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active {
    border-color: var(--accent);
    background: rgba(124,92,252,0.15);
    color: var(--accent);
  }
  .mode-btn.active.gnf {
    border-color: var(--accent2);
    background: rgba(252,92,125,0.12);
    color: var(--accent2);
  }

  /* Input section */
  .input-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 700px) {
    .input-section { grid-template-columns: 1fr; }
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .input-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-label span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .grammar-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  .grammar-textarea:focus { border-color: var(--accent); }

  .hint-box {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(124,92,252,0.07);
    border: 1px solid rgba(124,92,252,0.2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.6;
  }

  .examples-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .example-btn {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .example-btn:hover {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .example-btn strong {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
    color: var(--text-dim);
  }

  /* Action bar */
  .action-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .convert-btn {
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--accent), #9b7dfd);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .convert-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .convert-btn:hover::before { opacity: 1; }
  .convert-btn:active { transform: scale(0.98); }

  .convert-btn.gnf-mode {
    background: linear-gradient(135deg, var(--accent2), #fd7fa0);
  }

  .clear-btn {
    padding: 14px 24px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Steps pipeline */
  .steps-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .steps-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .mode-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mode-badge.cnf { background: rgba(124,92,252,0.2); color: var(--accent); }
  .mode-badge.gnf { background: rgba(252,92,125,0.15); color: var(--accent2); }

  /* Step card */
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-card:nth-child(1) { animation-delay: 0.05s; }
  .step-card:nth-child(2) { animation-delay: 0.1s; }
  .step-card:nth-child(3) { animation-delay: 0.15s; }
  .step-card:nth-child(4) { animation-delay: 0.2s; }
  .step-card:nth-child(5) { animation-delay: 0.25s; }
  .step-card:nth-child(6) { animation-delay: 0.3s; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .step-number {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  .step-title-group { flex: 1; }

  .step-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.2px;
  }

  .step-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    line-height: 1.4;
  }

  .step-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .badge-changed { background: rgba(92,240,192,0.15); color: var(--accent3); }
  .badge-removed { background: rgba(252,92,125,0.15); color: var(--accent2); }
  .badge-added { background: rgba(92,180,252,0.15); color: #5cb4fc; }
  .badge-ok { background: rgba(124,92,252,0.12); color: var(--accent); }
  .badge-none { background: rgba(255,255,255,0.05); color: var(--text-faint); }

  .step-chevron {
    color: var(--text-faint);
    font-size: 18px;
    transition: transform 0.25s;
  }

  .step-card.expanded .step-chevron { transform: rotate(180deg); }

  .step-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .step-card.expanded .step-body { display: block; }

  .explanation-box {
    padding: 12px 14px;
    background: rgba(124,92,252,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text-dim);
    margin: 14px 0;
    line-height: 1.6;
  }

  .explanation-box.gnf-style { border-left-color: var(--accent2); }

  .grammar-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.9;
  }

  .grammar-block .rule { color: var(--text); }
  .grammar-block .rule .nt { color: #7c5cfc; }
  .grammar-block .rule .arrow { color: var(--text-faint); margin: 0 4px; }
  .grammar-block .rule .terminal { color: #5cf0c0; }
  .grammar-block .rule .new { background: rgba(92,240,192,0.12); padding: 0 2px; border-radius: 3px; }
  .grammar-block .rule .removed { text-decoration: line-through; color: var(--text-faint); }

  .changes-list {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .change-tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  /* Final result */
  .final-card {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 24px;
    margin-top: 24px;
    animation: fadeUp 0.4s ease both;
    animation-delay: 0.35s;
  }

  .final-card.gnf-mode { border-color: var(--accent2); }

  .final-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .final-card.gnf-mode .final-label { color: var(--accent2); }

  .final-label::before {
    content: '✦';
    font-size: 14px;
  }

  /* Error */
  .error-box {
    padding: 14px 18px;
    background: rgba(252,92,125,0.08);
    border: 1px solid rgba(252,92,125,0.3);
    border-radius: 10px;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 20px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-faint);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 14px; line-height: 1.6; }
  .empty-state strong { display: block; font-size: 16px; margin-bottom: 8px; color: var(--text-dim); }

  /* copy btn */
  .copy-btn {
    margin-top: 12px;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent3); color: var(--accent3); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">CFG</div>
        <div>
          <h1>Grammar <span>Converter</span></h1>
          <div class="subtitle">CFG → CNF &amp; GNF step-by-step</div>
        </div>
      </div>
      <div class="mode-bar">
        <button class="mode-btn active" id="cnfBtn" onclick="setMode('cnf')">→ CNF</button>
        <button class="mode-btn gnf" id="gnfBtn" onclick="setMode('gnf')">→ GNF</button>
      </div>
    </div>
  </header>

  <div class="input-section">
    <div class="input-card">
      <div class="input-label"><span></span> Input Grammar (CFG)</div>
      <textarea class="grammar-textarea" id="grammarInput" placeholder="S -> AB | a&#10;A -> aA | a&#10;B -> bB | b"></textarea>
      <div class="hint-box">
        Format: <code>S -> AB | a</code><br>
        Use uppercase for non-terminals, lowercase/symbols for terminals.<br>
        Use <code>ε</code> or <code>eps</code> for empty string.
      </div>
    </div>
    <div class="input-card">
      <div class="input-label"><span></span> Quick Examples</div>
      <div class="examples-panel">
        <button class="example-btn" onclick="loadExample(0)">
          <strong>Example 1 — Simple</strong>S → AB | a &nbsp; A → aA | a &nbsp; B → bB | b
        </button>
        <button class="example-btn" onclick="loadExample(1)">
          <strong>Example 2 — ε-production</strong>S → ASA | aB &nbsp; A → B | S &nbsp; B → b | ε
        </button>
        <button class="example-btn" onclick="loadExample(2)">
          <strong>Example 3 — Unit production</strong>S → A | B &nbsp; A → a &nbsp; B → b | C &nbsp; C → c
        </button>
        <button class="example-btn" onclick="loadExample(3)">
          <strong>Example 4 — Left Recursion</strong>A → Aa | b &nbsp; S → A | c
        </button>
        <button class="example-btn" onclick="loadExample(4)">
          <strong>Example 5 — Long production</strong>S → ABCD &nbsp; A → a &nbsp; B → b &nbsp; C → c &nbsp; D → d
        </button>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="convert-btn" id="convertBtn" onclick="convert()">Convert to CNF</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <div id="output"></div>
</div>

<script>
const EXAMPLES = [
  "S -> AB | a\nA -> aA | a\nB -> bB | b",
  "S -> ASA | aB\nA -> B | S\nB -> b | eps",
  "S -> A | B\nA -> a\nB -> b | C\nC -> c",
  "A -> Aa | b\nS -> A | c",
  "S -> ABCD\nA -> a\nB -> b\nC -> c\nD -> d"
];

let currentMode = 'cnf';

function setMode(m) {
  currentMode = m;
  document.getElementById('cnfBtn').classList.toggle('active', m === 'cnf');
  document.getElementById('gnfBtn').classList.toggle('active', m === 'gnf');
  document.getElementById('convertBtn').textContent = m === 'cnf' ? 'Convert to CNF' : 'Convert to GNF';
  document.getElementById('convertBtn').className = 'convert-btn' + (m === 'gnf' ? ' gnf-mode' : '');
  document.getElementById('output').innerHTML = '';
}

function loadExample(i) {
  document.getElementById('grammarInput').value = EXAMPLES[i];
}

function clearAll() {
  document.getElementById('grammarInput').value = '';
  document.getElementById('output').innerHTML = '';
}

// ─── Parser ──────────────────────────────────────────────────────────────────
function parseGrammar(text) {
  const rules = {};
  const lines = text.trim().split('\n');
  let start = null;
  for (const line of lines) {
    if (!line.trim()) continue;
    const [lhs, rhs] = line.split('->').map(s => s.trim());
    if (!lhs || !rhs) throw new Error(`Invalid rule: "${line}"`);
    if (!start) start = lhs;
    const prods = rhs.split('|').map(p => {
      const sym = p.trim();
      if (sym === 'ε' || sym === 'eps' || sym === 'epsilon') return ['ε'];
      return sym.split(/\s+/).filter(Boolean);
    });
    if (!rules[lhs]) rules[lhs] = [];
    rules[lhs].push(...prods);
  }
  if (!start) throw new Error('Empty grammar');
  return { rules, start };
}

function isTerminal(s) { return s !== 'ε' && (s === s.toLowerCase() || /^[^A-Z]/.test(s)); }
function isNT(s) { return s !== 'ε' && /^[A-Z]/.test(s); }

function cloneRules(rules) {
  const c = {};
  for (const k in rules) c[k] = rules[k].map(p => [...p]);
  return c;
}

function rulesEqual(a, b) {
  return JSON.stringify(sortRules(a)) === JSON.stringify(sortRules(b));
}

function sortRules(r) {
  const s = {};
  for (const k of Object.keys(r).sort()) s[k] = r[k].map(p => [...p].sort()).sort((a,b) => a.join('') < b.join('') ? -1 : 1);
  return s;
}

function grammarToString(rules) {
  return Object.entries(rules).map(([k, prods]) =>
    `${k} → ${prods.map(p => p.join(' ')).join(' | ')}`
  ).join('\n');
}

// ─── CNF Steps ───────────────────────────────────────────────────────────────

function removeUselessSymbols(rules, start) {
  // Step 1: find generating symbols
  let generating = new Set();
  let changed = true;
  while (changed) {
    changed = false;
    for (const [nt, prods] of Object.entries(rules)) {
      if (generating.has(nt)) continue;
      for (const prod of prods) {
        if (prod.every(s => s === 'ε' || isTerminal(s) || generating.has(s))) {
          generating.add(nt); changed = true; break;
        }
      }
    }
  }
  // Step 2: find reachable
  let reachable = new Set([start]);
  changed = true;
  while (changed) {
    changed = false;
    for (const nt of [...reachable]) {
      for (const prod of (rules[nt] || [])) {
        for (const s of prod) {
          if (isNT(s) && !reachable.has(s)) { reachable.add(s); changed = true; }
        }
      }
    }
  }
  const useful = new Set([...generating].filter(s => reachable.has(s)));
  const newRules = {};
  for (const nt of Object.keys(rules)) {
    if (!useful.has(nt)) continue;
    const filtered = rules[nt].filter(p =>
      p.every(s => s === 'ε' || isTerminal(s) || useful.has(s))
    );
    if (filtered.length) newRules[nt] = filtered;
  }
  const removed = Object.keys(rules).filter(k => !newRules[k]);
  return { rules: newRules, removed, generating: [...generating], reachable: [...reachable], useful: [...useful] };
}

function removeEpsilon(rules, start) {
  // Find nullable
  let nullable = new Set();
  let changed = true;
  while (changed) {
    changed = false;
    for (const [nt, prods] of Object.entries(rules)) {
      if (nullable.has(nt)) continue;
      for (const p of prods) {
        if (p.length === 1 && p[0] === 'ε') { nullable.add(nt); changed = true; break; }
        if (p.every(s => nullable.has(s))) { nullable.add(nt); changed = true; break; }
      }
    }
  }
  if (!nullable.size) return { rules: cloneRules(rules), nullable: [], changed: false };

  const newRules = {};
  for (const [nt, prods] of Object.entries(rules)) {
    newRules[nt] = new Set();
    for (const prod of prods) {
      if (prod.length === 1 && prod[0] === 'ε') continue;
      const positions = prod.map((s,i) => nullable.has(s) ? i : -1).filter(i => i >= 0);
      const count = positions.length;
      for (let mask = 0; mask < (1 << count); mask++) {
        const newProd = prod.filter((s, i) => {
          const pos = positions.indexOf(i);
          return pos === -1 || (mask >> pos) & 1;
        });
        if (newProd.length > 0) newRules[nt].add(newProd.join(' '));
      }
    }
    newRules[nt] = [...newRules[nt]].map(p => p.split(' '));
  }
  if (nullable.has(start)) {
    if (!newRules[start]) newRules[start] = [];
    newRules[start].push(['ε']);
  }
  return { rules: newRules, nullable: [...nullable], changed: true };
}

function removeUnitProductions(rules) {
  const newRules = cloneRules(rules);
  const allNTs = Object.keys(newRules);
  let anyChanged = false;
  for (const nt of allNTs) {
    // find unit closure
    let closure = new Set([nt]);
    let changed = true;
    while (changed) {
      changed = false;
      for (const a of [...closure]) {
        for (const p of (newRules[a] || [])) {
          if (p.length === 1 && isNT(p[0]) && !closure.has(p[0])) {
            closure.add(p[0]); changed = true;
          }
        }
      }
    }
    closure.delete(nt);
    if (closure.size) {
      anyChanged = true;
      // collect non-unit productions from closure
      for (const b of closure) {
        for (const p of (newRules[b] || [])) {
          if (!(p.length === 1 && isNT(p[0]))) {
            if (!newRules[nt].some(x => x.join(' ') === p.join(' ')))
              newRules[nt].push([...p]);
          }
        }
      }
      newRules[nt] = newRules[nt].filter(p => !(p.length === 1 && isNT(p[0])));
    }
  }
  return { rules: newRules, changed: anyChanged };
}

function replaceTerminalsInLong(rules) {
  const newRules = cloneRules(rules);
  const termMap = {};
  let counter = 1;
  let changed = false;

  function getTermNT(t) {
    if (!termMap[t]) {
      let name;
      do { name = 'T' + (counter++); } while (newRules[name]);
      termMap[t] = name;
      newRules[name] = [[t]];
    }
    return termMap[t];
  }

  for (const nt of Object.keys(newRules)) {
    newRules[nt] = newRules[nt].map(prod => {
      if (prod.length < 2) return prod;
      changed = true;
      return prod.map(s => {
        if (isTerminal(s) && s !== 'ε') return getTermNT(s);
        return s;
      });
    });
  }
  return { rules: newRules, termMap, changed };
}

function binarize(rules) {
  const newRules = cloneRules(rules);
  let counter = 1;
  let changed = false;

  function newNT() {
    let name;
    do { name = 'X' + (counter++); } while (newRules[name]);
    return name;
  }

  const keys = [...Object.keys(newRules)];
  for (const nt of keys) {
    newRules[nt] = [];
    for (const prod of rules[nt]) {
      let p = [...prod];
      while (p.length > 2) {
        changed = true;
        const nn = newNT();
        newRules[nn] = [p.slice(1)];
        p = [p[0], nn];
      }
      newRules[nt].push(p);
    }
  }
  return { rules: newRules, changed };
}

// ─── GNF Steps ───────────────────────────────────────────────────────────────

function removeLeftRecursion(rules, start) {
  const nts = Object.keys(rules);
  const newRules = cloneRules(rules);
  let changed = false;

  // Order NTs
  for (let i = 0; i < nts.length; i++) {
    const Ai = nts[i];
    // Substitute earlier NTs
    for (let j = 0; j < i; j++) {
      const Aj = nts[j];
      const newProds = [];
      for (const prod of newRules[Ai]) {
        if (prod[0] === Aj) {
          changed = true;
          for (const ajProd of newRules[Aj]) {
            newProds.push([...ajProd, ...prod.slice(1)]);
          }
        } else {
          newProds.push(prod);
        }
      }
      newRules[Ai] = newProds;
    }
    // Remove immediate left recursion
    const recursive = newRules[Ai].filter(p => p[0] === Ai);
    const nonRecursive = newRules[Ai].filter(p => p[0] !== Ai);
    if (recursive.length) {
      changed = true;
      const Ai2 = Ai + "'";
      newRules[Ai] = nonRecursive.map(p => [...p, Ai2]);
      newRules[Ai2] = [
        ...recursive.map(p => [...p.slice(1), Ai2]),
        ['ε']
      ];
    }
  }
  return { rules: newRules, changed };
}

function toGNF(rules, start) {
  // Make each rule start with a terminal
  const newRules = cloneRules(rules);
  let counter = 1;
  let changed = false;

  function newNT() {
    let name;
    do { name = 'G' + (counter++); } while (newRules[name]);
    return name;
  }

  // Replace terminals
  const termMap = {};
  function getTermNT(t) {
    if (!termMap[t]) {
      const nn = newNT();
      termMap[t] = nn;
      newRules[nn] = [[t]];
    }
    return termMap[t];
  }

  let maxIter = 20;
  while (maxIter-- > 0) {
    let iterChanged = false;
    for (const nt of [...Object.keys(newRules)]) {
      const newProds = [];
      for (const prod of newRules[nt]) {
        if (prod[0] === 'ε') { newProds.push(prod); continue; }
        if (isTerminal(prod[0])) { newProds.push(prod); continue; }
        // starts with NT - substitute
        const head = prod[0];
        if (newRules[head]) {
          changed = true; iterChanged = true;
          for (const sub of newRules[head]) {
            newProds.push([...sub, ...prod.slice(1)]);
          }
        } else {
          newProds.push(prod);
        }
      }
      newRules[nt] = newProds;
    }
    if (!iterChanged) break;
  }

  // Now clean duplicates & binarize the NT tails
  for (const nt of Object.keys(newRules)) {
    const seen = new Set();
    newRules[nt] = newRules[nt].filter(p => {
      const k = p.join('|');
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
  }

  return { rules: newRules, termMap, changed };
}

// ─── Render ──────────────────────────────────────────────────────────────────

const STEP_COLORS_CNF = ['#7c5cfc','#fc5c7d','#fcb55c','#5cf0c0','#5cb4fc','#fc5cec'];
const STEP_COLORS_GNF = ['#fc5c7d','#fcb55c','#5cf0c0','#7c5cfc','#5cb4fc','#fc5cec'];

const CNF_STEPS_META = [
  { name: 'Remove Useless Symbols', desc: 'Eliminate non-generating and unreachable symbols from the grammar.' },
  { name: 'Remove ε-Productions', desc: 'Eliminate all epsilon (empty string) productions except possibly from the start symbol.' },
  { name: 'Remove Unit Productions', desc: 'Remove productions of the form A → B where B is a single non-terminal.' },
  { name: 'Replace Terminals in Long Rules', desc: 'In rules with 2+ symbols, replace each terminal t with a new non-terminal Tₜ where Tₜ → t.' },
  { name: 'Break Long Rules (Binarize)', desc: 'Split any production A → X₁X₂…Xₙ (n > 2) into binary productions using new non-terminals.' },
];

const GNF_STEPS_META = [
  { name: 'Remove Useless Symbols', desc: 'Eliminate non-generating and unreachable non-terminals first.' },
  { name: 'Remove ε-Productions', desc: 'Remove epsilon productions (except possibly the start symbol).' },
  { name: 'Remove Unit Productions', desc: 'Remove all A → B unit productions by substitution.' },
  { name: 'Remove Left Recursion', desc: 'Eliminate direct and indirect left recursion. Introduces new non-terminals with \'.' },
  { name: 'Start Every Rule with a Terminal', desc: 'Substitute non-terminals at the head of each production until every rule begins with a terminal.' },
  { name: 'Adjust to Full GNF Form', desc: 'Final cleanup: remove duplicates, verify all rules are in Greibach Normal Form.' },
];

function renderGrammarBlock(rules) {
  if (!rules || !Object.keys(rules).length) return '<em style="color:var(--text-faint)">empty</em>';
  return Object.entries(rules).map(([nt, prods]) => {
    const rhsList = prods.map(p =>
      p.map(s => {
        if (s === 'ε') return `<span class="terminal">ε</span>`;
        if (isTerminal(s)) return `<span class="terminal">${s}</span>`;
        return `<span class="nt">${s}</span>`;
      }).join(' ')
    ).join(' <span class="arrow">|</span> ');
    return `<div class="rule"><span class="nt">${nt}</span><span class="arrow">→</span>${rhsList}</div>`;
  }).join('');
}

function diffSummary(before, after) {
  const bNTs = new Set(Object.keys(before));
  const aNTs = new Set(Object.keys(after));
  const removed = [...bNTs].filter(k => !aNTs.has(k));
  const added = [...aNTs].filter(k => !bNTs.has(k));
  const changed = [...aNTs].filter(k => bNTs.has(k) && JSON.stringify(before[k]) !== JSON.stringify(after[k]));
  return { removed, added, changed };
}

function renderStepCard(idx, meta, before, after, color, explanation, mode) {
  const diff = diffSummary(before, after);
  const noChange = !diff.removed.length && !diff.added.length && !diff.changed.length;

  let badge, badgeClass;
  if (noChange) { badge = 'No change'; badgeClass = 'badge-none'; }
  else if (diff.removed.length && !diff.added.length) { badge = `−${diff.removed.length} symbol${diff.removed.length>1?'s':''}`; badgeClass = 'badge-removed'; }
  else if (diff.added.length) { badge = `+${diff.added.length} new NT${diff.added.length>1?'s':''}`; badgeClass = 'badge-added'; }
  else { badge = `${diff.changed.length} rule${diff.changed.length>1?'s':''} modified`; badgeClass = 'badge-changed'; }

  return `
    <div class="step-card" id="step-${idx}">
      <div class="step-header" onclick="toggleStep(${idx})">
        <div class="step-number" style="background:${color}22;color:${color}">${idx+1}</div>
        <div class="step-title-group">
          <div class="step-name">${meta.name}</div>
          <div class="step-desc">${meta.desc}</div>
        </div>
        <span class="step-badge ${badgeClass}">${badge}</span>
        <span class="step-chevron">⌄</span>
      </div>
      <div class="step-body">
        <div class="explanation-box ${mode==='gnf'?'gnf-style':''}">${explanation}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px">
          <div>
            <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px">Before</div>
            <div class="grammar-block">${renderGrammarBlock(before)}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${color};margin-bottom:8px">After</div>
            <div class="grammar-block" style="border-color:${color}44">${renderGrammarBlock(after)}</div>
          </div>
        </div>
        ${!noChange ? `
        <div class="changes-list">
          ${diff.removed.map(k=>`<span class="change-tag" style="background:rgba(252,92,125,0.12);color:#fc5c7d">−${k} removed</span>`).join('')}
          ${diff.added.map(k=>`<span class="change-tag" style="background:rgba(92,180,252,0.12);color:#5cb4fc">+${k} added</span>`).join('')}
          ${diff.changed.map(k=>`<span class="change-tag" style="background:rgba(92,240,192,0.12);color:#5cf0c0">${k} modified</span>`).join('')}
        </div>` : ''}
      </div>
    </div>
  `;
}

function toggleStep(idx) {
  document.getElementById('step-' + idx).classList.toggle('expanded');
}

function convert() {
  const text = document.getElementById('grammarInput').value;
  const out = document.getElementById('output');

  try {
    let { rules, start } = parseGrammar(text);
    if (currentMode === 'cnf') convertCNF(rules, start, out);
    else convertGNF(rules, start, out);
  } catch(e) {
    out.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
  }
}

function convertCNF(rules, start, out) {
  const steps = [];
  const colors = STEP_COLORS_CNF;
  const meta = CNF_STEPS_META;

  let g0 = cloneRules(rules);

  // Step 1: Remove useless
  const s1 = removeUselessSymbols(g0, start);
  steps.push({
    before: g0,
    after: s1.rules,
    exp: `Found <strong>${s1.generating.length}</strong> generating symbols: <code>${s1.generating.join(', ')}</code>. Reachable from start: <code>${s1.reachable.join(', ')}</code>. Removed: <code>${s1.removed.length ? s1.removed.join(', ') : 'none'}</code>.`
  });

  // Step 2: Remove epsilon
  let g1 = s1.rules;
  const s2 = removeEpsilon(g1, start);
  steps.push({
    before: g1,
    after: s2.rules,
    exp: s2.nullable.length
      ? `Nullable non-terminals found: <code>${s2.nullable.join(', ')}</code>. For each ε-production, generated all combinations of productions with those nullable symbols either included or omitted.`
      : `No nullable non-terminals found. No ε-productions to remove.`
  });

  // Step 3: Unit productions
  let g2 = s2.rules;
  const s3 = removeUnitProductions(g2);
  steps.push({
    before: g2,
    after: s3.rules,
    exp: s3.changed
      ? `Unit productions (A → B form) detected and removed. Each unit chain was replaced by propagating the non-unit productions directly, eliminating intermediate single-NT derivations.`
      : `No unit productions found in this grammar. This step is a no-op.`
  });

  // Step 4: Replace terminals in long rules
  let g3 = s3.rules;
  const s4 = replaceTerminalsInLong(g3);
  const termEntries = Object.entries(s4.termMap);
  steps.push({
    before: g3,
    after: s4.rules,
    exp: termEntries.length
      ? `In productions with ≥ 2 symbols, bare terminals must be replaced. Created: ${termEntries.map(([t,n])=>`<code>${n} → ${t}</code>`).join(', ')}.`
      : `No long rules contained bare terminals needing replacement.`
  });

  // Step 5: Binarize
  let g4 = s4.rules;
  const s5 = binarize(g4);
  steps.push({
    before: g4,
    after: s5.rules,
    exp: s5.changed
      ? `Productions with 3+ symbols were broken down using new helper non-terminals (X₁, X₂, …). Each rule is now at most binary: A → BC.`
      : `All productions already have at most 2 symbols. No binarization needed.`
  });

  const cards = steps.map((s, i) => renderStepCard(i, meta[i], s.before, s.after, colors[i], s.exp, 'cnf')).join('');

  const finalGram = grammarToString(s5.rules);

  out.innerHTML = `
    <div class="steps-header">
      <div class="steps-title">Transformation Steps</div>
      <div class="mode-badge cnf">Chomsky Normal Form</div>
    </div>
    ${cards}
    <div class="final-card">
      <div class="final-label">Final CNF Grammar</div>
      <div class="grammar-block" style="border-color:var(--accent)44">${renderGrammarBlock(s5.rules)}</div>
      <button class="copy-btn" onclick="copyText(\`${finalGram.replace(/`/g,'\\`')}\`)">Copy Grammar</button>
    </div>
  `;
}

function convertGNF(rules, start, out) {
  const steps = [];
  const colors = STEP_COLORS_GNF;
  const meta = GNF_STEPS_META;

  let g0 = cloneRules(rules);

  // Step 1: Remove useless
  const s1 = removeUselessSymbols(g0, start);
  steps.push({
    before: g0,
    after: s1.rules,
    exp: `Removed non-generating and unreachable symbols. Useless: <code>${s1.removed.length ? s1.removed.join(', ') : 'none'}</code>.`
  });

  // Step 2: Remove epsilon
  let g1 = s1.rules;
  const s2 = removeEpsilon(g1, start);
  steps.push({
    before: g1,
    after: s2.rules,
    exp: s2.nullable.length
      ? `Nullable: <code>${s2.nullable.join(', ')}</code>. ε-productions removed by generating all non-empty combinations.`
      : `No nullable symbols found. Grammar has no ε-productions.`
  });

  // Step 3: Remove unit productions
  let g2 = s2.rules;
  const s3 = removeUnitProductions(g2);
  steps.push({
    before: g2,
    after: s3.rules,
    exp: s3.changed
      ? `Unit productions (A → B) removed by computing unit closures and substituting non-unit productions directly.`
      : `No unit productions found.`
  });

  // Step 4: Remove left recursion
  let g3 = s3.rules;
  const s4 = removeLeftRecursion(g3, start);
  steps.push({
    before: g3,
    after: s4.rules,
    exp: s4.changed
      ? `Left recursion removed using the standard algorithm: for directly left-recursive A → Aα | β, we introduce A' where A → βA' and A' → αA' | ε.`
      : `No left recursion detected in the grammar.`
  });

  // Step 5: GNF substitution
  let g4 = s4.rules;
  const s5 = toGNF(g4, start);
  steps.push({
    before: g4,
    after: s5.rules,
    exp: `Every production is forced to start with a terminal by repeatedly substituting the leading non-terminal with its own productions, until all rules begin with a terminal symbol.`
  });

  // Step 6: Final cleanup (deduplicate, verify)
  let g5 = s5.rules;
  const g6 = cloneRules(g5);
  for (const nt of Object.keys(g6)) {
    const seen = new Set();
    g6[nt] = g6[nt].filter(p => {
      const k = p.join(' ');
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
    // remove empty productions unless start
    if (nt !== start) g6[nt] = g6[nt].filter(p => !(p.length===1 && p[0]==='ε'));
  }
  steps.push({
    before: g5,
    after: g6,
    exp: `Duplicate productions removed. Remaining ε-productions (except possibly for start symbol) cleaned up. Each rule now has the form A → aα where a is terminal and α is a (possibly empty) string of non-terminals — Greibach Normal Form.`
  });

  const cards = steps.map((s, i) => renderStepCard(i, meta[i], s.before, s.after, colors[i], s.exp, 'gnf')).join('');
  const finalGram = grammarToString(g6);

  out.innerHTML = `
    <div class="steps-header">
      <div class="steps-title">Transformation Steps</div>
      <div class="mode-badge gnf">Greibach Normal Form</div>
    </div>
    ${cards}
    <div class="final-card gnf-mode">
      <div class="final-label">Final GNF Grammar</div>
      <div class="grammar-block" style="border-color:rgba(252,92,125,0.4)">${renderGrammarBlock(g6)}</div>
      <button class="copy-btn" onclick="copyText(\`${finalGram.replace(/`/g,'\\`')}\`)">Copy Grammar</button>
    </div>
  `;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.copy-btn');
    btns.forEach(b => { b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy Grammar', 1500); });
  });
}

// Show empty state on load
document.getElementById('output').innerHTML = `
  <div class="empty-state">
    <div class="empty-icon">⟨ ⟩</div>
    <strong>Enter a Context-Free Grammar</strong>
    <p>Type your grammar in the input box or load an example,<br>then click Convert to see step-by-step transformations.</p>
  </div>
`;
</script>
</body>
</html>
